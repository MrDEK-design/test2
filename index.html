<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Translator Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @supports (font: -apple-system-body) and (-webkit-appearance: none) {
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        }
        body { background-color: #000000; color: #f5f5f7; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        textarea:focus { outline: none; }
        
        .message-in { animation: slideInLeft 0.3s ease forwards; }
        .message-out { animation: slideInRight 0.3s ease forwards; }
        
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Typing indicator */
        .typing-indicator span {
            width: 5px; height: 5px; background-color: #86868b; border-radius: 50%; display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-[#0a84ff]/30 relative">

    <!-- SETUP OVERLAY (Створення/Вхід в кімнату) -->
    <div id="setup-screen" class="absolute inset-0 z-50 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-[#1c1c1e] border border-white/10 rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col gap-4">
            <h2 class="text-xl font-semibold text-center mb-2">Налаштування Чату</h2>
            
            <div>
                <label class="text-xs text-[#86868b] ml-2">Ваше ім'я</label>
                <input type="text" id="setup-name" placeholder="John Doe" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 mt-1 text-sm focus:border-[#0a84ff] transition-colors outline-none">
            </div>

            <div>
                <label class="text-xs text-[#86868b] ml-2">Ваша мова (на якій будете читати і писати)</label>
                <select id="setup-lang" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 mt-1 text-sm focus:border-[#0a84ff] transition-colors outline-none appearance-none">
                    <option value="uk">Українська</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="de">Deutsch</option>
                    <option value="pl">Polski</option>
                    <option value="fr">Français</option>
                </select>
            </div>

            <div class="h-px bg-white/10 my-2"></div>

            <div class="flex flex-col gap-3">
                <button onclick="createRoom()" class="w-full bg-[#0a84ff] hover:bg-[#0071e3] text-white rounded-xl py-3 font-medium transition-colors">
                    Створити новий ключ (кімнату)
                </button>
                <div class="flex items-center gap-2">
                    <input type="text" id="setup-room-key" placeholder="Введіть існуючий ключ..." class="flex-1 bg-black border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-[#0a84ff] transition-colors outline-none">
                    <button onclick="joinRoom()" class="bg-white/10 hover:bg-white/20 text-white rounded-xl px-4 py-3 font-medium transition-colors">
                        Увійти
                    </button>
                </div>
            </div>
            <p id="setup-error" class="text-red-500 text-xs text-center hidden"></p>
        </div>
    </div>

    <!-- MAIN CHAT UI -->
    <header class="absolute top-0 w-full z-20 bg-black/80 backdrop-blur-xl border-b border-white/10 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-600 to-blue-800 flex items-center justify-center shadow-lg border border-white/20">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
            </div>
            <div>
                <h1 class="text-[15px] font-semibold text-white tracking-tight leading-tight" id="chat-title">Транслятор</h1>
                <div class="flex items-center gap-1 cursor-pointer hover:text-white transition-colors group" onclick="copyRoomKey()">
                    <p class="text-[11px] text-[#86868b] font-medium" id="room-key-display">Ключ: -</p>
                    <svg class="opacity-0 group-hover:opacity-100 transition-opacity" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
            </div>
        </div>
        <button onclick="leaveRoom()" class="text-[#86868b] hover:text-white transition-colors text-xs font-medium bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full">
            Вийти
        </button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto px-4 pt-20 pb-28 md:px-20 lg:px-64 flex flex-col gap-4 scroll-smooth">
        <div class="text-center mt-10" id="empty-state">
            <p class="text-[#86868b] text-sm">Чат порожній.</p>
            <p class="text-[#86868b] text-xs mt-1">Скопіюйте ключ зверху та передайте співрозмовнику.</p>
        </div>
    </main>

    <footer class="absolute bottom-0 w-full px-4 pb-6 pt-10 bg-gradient-to-t from-black via-black/90 to-transparent flex justify-center z-20 pointer-events-none">
        <div class="w-full max-w-3xl relative pointer-events-auto">
            <div class="bg-[#1c1c1e]/90 backdrop-blur-2xl border border-white/10 rounded-[28px] flex items-end p-1.5 shadow-2xl transition-all">
                <textarea 
                    id="message-input" 
                    rows="1"
                    class="flex-1 bg-transparent text-[#f5f5f7] placeholder-[#86868b] px-4 py-2.5 max-h-[120px] text-[15px] resize-none leading-snug"
                    placeholder="Напишіть повідомлення..."
                    oninput="this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'"
                ></textarea>
                
                <button 
                    id="send-btn"
                    onclick="sendMessage()" 
                    class="w-9 h-9 shrink-0 flex items-center justify-center bg-[#0a84ff] text-white hover:bg-[#0071e3] rounded-full transition-all active:scale-90 disabled:opacity-50 disabled:bg-gray-600 mb-0.5 mr-0.5"
                >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-[#86868b] mt-3 font-medium" id="status-text">Переклад працює через Pollinations AI</p>
        </div>
    </footer>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Variables
        let db, auth, currentUser, currentRoomKey, myName, myLang, unsubscribeChat = null;
        let processedMessageIds = new Set();
        
        // Canvas Environment Variables Injection
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'standalone-translator-app';
        let firebaseConfig = null;

        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            } else {
                // FALLBACK FOR GITHUB PAGES (You MUST replace this object with your own Firebase project config when hosting on Github)
                firebaseConfig = {
                    apiKey: "YOUR_API_KEY",
                    authDomain: "YOUR_AUTH_DOMAIN",
                    projectId: "YOUR_PROJECT_ID",
                    storageBucket: "YOUR_STORAGE_BUCKET",
                    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
                    appId: "YOUR_APP_ID"
                };
            }

            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // Auth Logic (Canvas rules compliance)
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch(e) {
                    console.error("Auth failed. Check Firebase config.", e);
                    showSetupError("Помилка підключення до сервера (Firebase).");
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if(user) {
                    console.log("Authenticated as:", user.uid);
                }
            });

        } catch (error) {
            console.error("Firebase init error:", error);
            showSetupError("База даних не налаштована. Потрібен Firebase.");
        }

        // Global functions accessible from HTML
        window.createRoom = () => {
            if (!validateSetup()) return;
            const newKey = Math.random().toString(36).substring(2, 8).toUpperCase();
            enterChat(newKey);
        };

        window.joinRoom = () => {
            if (!validateSetup()) return;
            const keyInput = document.getElementById('setup-room-key').value.trim().toUpperCase();
            if (!keyInput) {
                showSetupError("Введіть ключ кімнати");
                return;
            }
            enterChat(keyInput);
        };

        window.leaveRoom = () => {
            if (unsubscribeChat) {
                unsubscribeChat();
                unsubscribeChat = null;
            }
            processedMessageIds.clear();
            document.getElementById('chat-container').innerHTML = `
                <div class="text-center mt-10" id="empty-state">
                    <p class="text-[#86868b] text-sm">Чат порожній.</p>
                </div>
            `;
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('setup-screen').style.opacity = '1';
            document.getElementById('setup-screen').style.pointerEvents = 'auto';
        };

        window.copyRoomKey = () => {
            if (currentRoomKey) {
                // Fallback copying method for iframes
                const el = document.createElement('textarea');
                el.value = currentRoomKey;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const display = document.getElementById('room-key-display');
                display.innerText = "Скопійовано!";
                setTimeout(() => { display.innerText = `Ключ: ${currentRoomKey}`; }, 2000);
            }
        };

        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentUser || !currentRoomKey) return;

            input.value = '';
            input.style.height = 'auto';
            document.getElementById('send-btn').disabled = true;

            try {
                // Rule 1 strictly followed
                const roomCollection = collection(db, 'artifacts', appId, 'public', 'data', `room_${currentRoomKey}`);
                await addDoc(roomCollection, {
                    senderId: currentUser.uid,
                    senderName: myName,
                    originalText: text,
                    sourceLang: myLang,
                    timestamp: serverTimestamp() // We rely on client-side sorting as a fallback to avoid complex queries (Rule 2)
                });
            } catch (error) {
                console.error("Error sending:", error);
                alert("Помилка відправки. Перевірте з'єднання.");
            } finally {
                document.getElementById('send-btn').disabled = false;
                input.focus();
            }
        };

        // Enter press handler
        document.getElementById('message-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        });

        // Helpers
        function validateSetup() {
            myName = document.getElementById('setup-name').value.trim();
            myLang = document.getElementById('setup-lang').value;
            if (!myName) {
                showSetupError("Введіть своє ім'я");
                return false;
            }
            if (!currentUser) {
                showSetupError("Зачекайте, йде підключення до сервера...");
                return false;
            }
            return true;
        }

        function showSetupError(msg) {
            const el = document.getElementById('setup-error');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        function enterChat(key) {
            currentRoomKey = key;
            document.getElementById('room-key-display').innerText = `Ключ: ${key}`;
            
            const setupScreen = document.getElementById('setup-screen');
            setupScreen.style.opacity = '0';
            setupScreen.style.pointerEvents = 'none';
            setTimeout(() => setupScreen.classList.add('hidden'), 300);

            listenToRoom(key);
        }

        function listenToRoom(key) {
            if (unsubscribeChat) unsubscribeChat();
            
            const chatContainer = document.getElementById('chat-container');
            const emptyState = document.getElementById('empty-state');
            
            // Rule 1 & 2: Simple query to collection, sort in memory if needed.
            const roomCollection = collection(db, 'artifacts', appId, 'public', 'data', `room_${key}`);
            
            // Note: Since we can't use complex orderBy without composite indexes often, 
            // we will fetch all and just append newly added docs from snapshot.
            
            unsubscribeChat = onSnapshot(roomCollection, (snapshot) => {
                if(snapshot.empty && processedMessageIds.size === 0) {
                    if(emptyState) emptyState.style.display = 'block';
                    return;
                }
                
                if(emptyState) emptyState.style.display = 'none';

                // Sort docs by timestamp client-side to satisfy Rule 2 (No complex queries)
                const docs = [];
                snapshot.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
                docs.sort((a, b) => {
                    const tA = a.timestamp ? a.timestamp.toMillis() : Date.now();
                    const tB = b.timestamp ? b.timestamp.toMillis() : Date.now();
                    return tA - tB;
                });

                docs.forEach(data => {
                    if (processedMessageIds.has(data.id)) return; // Already processed
                    processedMessageIds.add(data.id);
                    processIncomingMessage(data);
                });
                
            }, (error) => {
                console.error("Firestore Listen Error:", error);
                document.getElementById('status-text').innerText = "Помилка синхронізації з БД.";
            });
        }

        async function processIncomingMessage(msgData) {
            const chatContainer = document.getElementById('chat-container');
            const isMe = msgData.senderId === currentUser.uid;
            
            // Create container
            const msgWrapper = document.createElement('div');
            msgWrapper.className = `flex flex-col gap-1 w-full max-w-3xl mx-auto ${isMe ? 'items-end' : 'items-start'} mt-2 ${isMe ? 'message-out' : 'message-in'}`;
            msgWrapper.id = `msg-${msgData.id}`;
            chatContainer.appendChild(msgWrapper);

            const nameLabel = document.createElement('span');
            nameLabel.className = `text-[11px] text-[#86868b] ${isMe ? 'mr-4' : 'ml-4'}`;
            nameLabel.innerText = isMe ? 'Ви' : msgData.senderName;
            msgWrapper.appendChild(nameLabel);

            const bubble = document.createElement('div');
            // Styling depending on sender
            if (isMe) {
                bubble.className = "bg-[#0a84ff] text-white px-4 py-2.5 rounded-[20px] rounded-br-sm max-w-[85%] whitespace-pre-wrap shadow-sm text-[15px] leading-snug";
                bubble.innerText = msgData.originalText;
                msgWrapper.appendChild(bubble);
                scrollToBottom();
            } else {
                bubble.className = "bg-[#1c1c1e] text-[#f5f5f7] border border-white/5 px-4 py-2.5 rounded-[20px] rounded-tl-sm max-w-[85%] whitespace-pre-wrap shadow-sm text-[15px] leading-snug";
                msgWrapper.appendChild(bubble);
                
                // Translation Logic
                if (msgData.sourceLang === myLang) {
                    bubble.innerText = msgData.originalText;
                    scrollToBottom();
                } else {
                    // Show Loading
                    bubble.innerHTML = `<div class="typing-indicator flex gap-1 items-center justify-center py-1"><span></span><span></span><span></span></div>`;
                    scrollToBottom();
                    
                    // Call AI to translate
                    try {
                        const translatedText = await translateText(msgData.originalText, msgData.sourceLang, myLang);
                        bubble.innerHTML = "";
                        
                        const translatedSpan = document.createElement('span');
                        translatedSpan.innerText = translatedText;
                        
                        const originalHint = document.createElement('div');
                        originalHint.className = "text-[10px] text-[#86868b] mt-1 pt-1 border-t border-white/10";
                        originalHint.innerText = `Оригінал (${msgData.sourceLang}): ${msgData.originalText}`;
                        
                        bubble.appendChild(translatedSpan);
                        bubble.appendChild(originalHint);
                    } catch (e) {
                        bubble.innerText = `[Помилка перекладу] ${msgData.originalText}`;
                    }
                    scrollToBottom();
                }
            }
        }

        async function translateText(text, fromLang, toLang) {
            // Using Pollinations AI as a free translating endpoint
            const prompt = `You are a strict translator API. Translate the following text from ISO language code '${fromLang}' to ISO language code '${toLang}'. Return ONLY the translated text, without quotes, explanations, or conversational filler. Text to translate: "${text}"`;
            
            const response = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [{ role: "system", content: prompt }],
                    model: 'openai',
                    jsonMode: false
                })
            });

            if (!response.ok) throw new Error('API failed');
            const translated = await response.text();
            return translated.trim();
        }

        function scrollToBottom() {
            setTimeout(() => {
                const container = document.getElementById('chat-container');
                container.scrollTop = container.scrollHeight;
            }, 50);
        }
    </script>
</body>
</html>
